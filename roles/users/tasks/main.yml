---
- name: Create users
  ansible.builtin.user:
    name: "{{ item.name }}"
    comment: "{{ item.comment }}"
    groups: "{{ item.groups }}"
    append: yes
    shell: "{{ item.shell }}"
    password: "{{ devops_password_hash | default(omit) }}"
    state: present
  loop: "{{ local_users }}"

- name: Force password change on first login
  ansible.builtin.command: "chage -d 0 {{ item.name }}"
  loop: "{{ local_users }}"
  when: devops_password_hash is defined
